<div *ngIf="loading" class="loading-row">Loading most active stocks…</div>

<div *ngIf="!loading && !hasError && dataSource.data.length === 0" class="empty-state">
  {{ emptyMessage }}
</div>

<div *ngIf="hasError" class="empty-state error-state">
  Unable to load most active stocks right now. Please try again later.
</div>

<table *ngIf="!loading && dataSource.data.length > 0" mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Symbol </th>
      <td mat-cell *matCellDef="let element">
        <a [href]="'https://finviz.com/quote.ashx?t=' + element.symbol" target="_blank">{{ element.symbol }}</a>
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
      <td mat-cell *matCellDef="let element">${{ element.price }}</td>
    </ng-container>

    <ng-container matColumnDef="change">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Change </th>
      <td mat-cell *matCellDef="let element">{{ element.change }}</td>
    </ng-container>

    <ng-container matColumnDef="changesPercentage">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> % Change </th>
      <td mat-cell *matCellDef="let element">{{ element.changesPercentage | number:'1.2-2' }}%</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
