<div >
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <!-- Symbol -->
    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Symbol </th>
      <td mat-cell *matCellDef="let element">
        <a [href]="'https://finviz.com/quote.ashx?t=' + element.symbol" target="_blank">
          {{ element.symbol }}
        </a>
      </td>
    </ng-container>

    <!-- Price -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
      <td mat-cell *matCellDef="let element">
        ${{ element.price | number: '1.2-2' }}
      </td>
    </ng-container>

    <!-- Volume -->
    <ng-container matColumnDef="volume">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Volume </th>
      <td mat-cell *matCellDef="let element">
        {{ element.volume | number }}
      </td>
    </ng-container>

    <!-- Market Cap -->
    <ng-container matColumnDef="marketCap">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Market Cap </th>
      <td mat-cell *matCellDef="let element">
        {{ element.marketCap | number }}
      </td>
    </ng-container>

    <!-- Percent Change -->
    <ng-container matColumnDef="percentChange">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> % Change </th>
      <td mat-cell *matCellDef="let element">
        <span [ngStyle]="{'color': element.percentChange >= 0 ? 'green' : 'red'}">
          {{ element.percentChange | number: '1.2-2' }}%
        </span>
      </td>
    </ng-container>

    <!-- Table Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<div *ngIf="!loading && !dataSource.data.length">
  No stocks in the watchlist.
</div>
